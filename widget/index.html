<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kai — Your Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="frame">
        <header class="topbar">
          <div>
            <p class="eyebrow">Personal AI Companion</p>
            <h1>Kai</h1>
          </div>
          <div class="lights" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </header>

        <section class="status-row">
          <div class="status-card">
            <span class="status-label">Link</span>
            <strong id="healthLabel">Booting...</strong>
          </div>
          <div class="status-card">
            <span class="status-label">Mode</span>
            <strong>Companion Chat</strong>
          </div>
          <div class="status-card">
            <span class="status-label">Mood</span>
            <strong>Attentive</strong>
          </div>
        </section>

        <section id="messages" class="messages" aria-live="polite">
          <article class="message assistant">
            <span class="tag">KAI</span>
            <p>I'm here. Ask me anything — commands, troubleshooting, or just talk.</p>
          </article>
        </section>

        <section class="quick-actions">
          <button data-prompt="How do I check listening ports on Kali?">🔍 Ports</button>
          <button data-prompt="Explain how to safely update Kali packages.">📦 Update</button>
          <button data-prompt="Read my screen and summarize what matters.">👁 Screen</button>
          <button data-prompt="What should I check when a service fails to start?">🔧 Services</button>
        </section>

        <form id="chatForm" class="composer">
          <label class="composer-label" for="promptInput">Talk to Kai</label>
          <div class="composer-row">
            <textarea
              id="promptInput"
              name="prompt"
              rows="3"
              placeholder="What's on your mind?"
            ></textarea>
            <button id="sendButton" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
