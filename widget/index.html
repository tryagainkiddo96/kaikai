<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kai Pip-Boy Widget</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="frame">
        <header class="topbar">
          <div>
            <p class="eyebrow">Vault-Tec Personal Assistant Interface</p>
            <h1>Kai Communicator</h1>
          </div>
          <div class="lights" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </header>

        <section class="status-row">
          <div class="status-card">
            <span class="status-label">Link</span>
            <strong id="healthLabel">Booting...</strong>
          </div>
          <div class="status-card">
            <span class="status-label">Mode</span>
            <strong>Field Ops Chat</strong>
          </div>
          <div class="status-card">
            <span class="status-label">Tone</span>
            <strong>Warm / Practical</strong>
          </div>
        </section>

        <section id="messages" class="messages" aria-live="polite">
          <article class="message assistant">
            <span class="tag">KAI</span>
            <p>Signal acquired. Ask for commands, troubleshooting, or a fast explanation.</p>
          </article>
        </section>

        <section class="quick-actions">
          <button data-prompt="How do I check listening ports on Kali?">Ports</button>
          <button data-prompt="Explain how to safely update Kali packages.">Update</button>
          <button data-prompt="Read my screen and summarize what matters.">Screen</button>
          <button data-prompt="What should I check when a service fails to start?">Services</button>
        </section>

        <form id="chatForm" class="composer">
          <label class="composer-label" for="promptInput">Transmit Query</label>
          <div class="composer-row">
            <textarea
              id="promptInput"
              name="prompt"
              rows="3"
              placeholder="Talk to Kai naturally..."
            ></textarea>
            <button id="sendButton" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
